<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kitchen Tracker Pro - Secure Edition</title>
    
    <meta name="theme-color" content="#075e54">
    <link rel="manifest" id="manifest-placeholder">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #e5ddd5; margin: 0; padding: 0; overflow-x: hidden; }
        #loginPage { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #075e54; z-index: 5000; display: flex; align-items: center; justify-content: center; color: white; }
        .login-card { background: white; padding: 30px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; color: #333; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .login-card input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .login-btn { width: 100%; background: #25d366; color: white; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #mainApp { display: none; }
        .header { background: #075e54; color: white; padding: 12px 15px; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; gap: 10px; }
        .tabs { display: flex; background: #075e54; color: #b1d4d0; position: sticky; top: 50px; z-index: 100; }
        .tab { flex: 1; text-align: center; padding: 14px 0; font-weight: bold; cursor: pointer; border-bottom: 3px solid transparent; }
        .tab.active { color: white; border-bottom: 3px solid #fff; }
        .content { display: none; padding: 15px; padding-bottom: 110px; }
        .content.active { display: block; }
        .input-card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .user-total-info { background: #dcf8c6; padding: 10px; border-radius: 8px; font-weight: bold; text-align: center; margin-bottom: 15px; }
        li { background: white; padding: 10px; margin-bottom: 8px; border-radius: 10px; display: flex; align-items: center; border-left: 5px solid #075e54; }
        .footer-fixed { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; text-align: center; z-index: 1000; }
        .modal { display: none; position: fixed; z-index: 3000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 85%; max-width: 380px; text-align: center; }
        .sidenav { height: 100%; width: 0; position: fixed; z-index: 2000; top: 0; left: 0; background: white; transition: 0.3s; padding-top: 60px; box-shadow: 2px 0 10px rgba(0,0,0,0.2); overflow-x: hidden; }
        .sidenav a { padding: 15px 25px; text-decoration: none; font-size: 18px; color: #333; display: block; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div id="loginPage">
    <div class="login-card">
        <h2>Kitchen Login</h2>
        <input type="email" id="loginEmail" placeholder="Email Address">
        <input type="password" id="loginPassword" placeholder="Password">
        <button class="login-btn" onclick="handleLogin()">Login</button>
        <p id="loginError" style="color:red; font-size:12px; margin-top:10px; display:none;">Invalid Email or Password</p>
    </div>
</div>

<div id="mainApp">
    <div id="mySidenav" class="sidenav">
        <a href="javascript:void(0)" onclick="closeNav()" style="font-size:30px; color:#075e54;">&times;</a>
        <div id="userWelcome" style="padding:20px; font-weight:bold; color:#075e54; border-bottom:2px solid #eee;">Hi, User</div>
        <a href="#" onclick="sendPasswordReset()">⚙️ Change Password</a>
        <a href="#" onclick="handleLogout()" style="color:red;">🚪 Logout</a>
    </div>

    <div class="header">
        <span onclick="openNav()" style="font-size:24px; cursor:pointer;">&#9776;</span>
        <h1 style="flex-grow:1; font-size:16px; margin:0;">Kitchen Hisab 🥘</h1>
        <select id="monthFilter" onchange="filterData()" style="background:#128c7e; color:white; padding:5px; border-radius:5px;"></select>
    </div>

    <div class="tabs">
        <div class="tab" id="tabHaseeb" onclick="openTab(event, 'Haseeb')">Haseeb</div>
        <div class="tab" id="tabArsalan" onclick="openTab(event, 'Arsalan')">Arsalan</div>
        <div class="tab" id="tabAftab" onclick="openTab(event, 'Aftab')">Aftab</div>
    </div>

    <div id="Haseeb" class="content">
        <div class="input-card"><input type="text" id="itemHaseeb" placeholder="Saman" style="width:100%; margin-bottom:10px; padding:10px;"><input type="number" id="priceHaseeb" placeholder="Amount" style="width:100%; margin-bottom:10px; padding:10px;"><button onclick="addItem('Haseeb')" style="width:100%; background:#25d366; color:white; padding:12px; border:none; border-radius:8px;">SAVE</button></div>
        <div class="user-total-info">Total: SAR <span id="totalHaseeb">0</span></div>
        <div id="listHaseeb"></div>
    </div>
    <div id="Arsalan" class="content">
        <div class="input-card"><input type="text" id="itemArsalan" placeholder="Saman" style="width:100%; margin-bottom:10px; padding:10px;"><input type="number" id="priceArsalan" placeholder="Amount" style="width:100%; margin-bottom:10px; padding:10px;"><button onclick="addItem('Arsalan')" style="width:100%; background:#25d366; color:white; padding:12px; border:none; border-radius:8px;">SAVE</button></div>
        <div class="user-total-info">Total: SAR <span id="totalArsalan">0</span></div>
        <div id="listArsalan"></div>
    </div>
    <div id="Aftab" class="content">
        <div class="input-card"><input type="text" id="itemAftab" placeholder="Saman" style="width:100%; margin-bottom:10px; padding:10px;"><input type="number" id="priceAftab" placeholder="Amount" style="width:100%; margin-bottom:10px; padding:10px;"><button onclick="addItem('Aftab')" style="width:100%; background:#25d366; color:white; padding:12px; border:none; border-radius:8px;">SAVE</button></div>
        <div class="user-total-info">Total: SAR <span id="totalAftab">0</span></div>
        <div id="listAftab"></div>
    </div>
    <div class="footer-fixed"><b>GRAND TOTAL: SAR <span id="grandTotal">0</span></b></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, getDocs, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAywmVNaLkyudJelZ-Gdx6gL1hydzxe2cg",
    authDomain: "haseeb-984fc.firebaseapp.com",
    projectId: "haseeb-984fc",
    storageBucket: "haseeb-984fc.firebasestorage.app",
    messagingSenderId: "868884894390",
    appId: "1:868884894390:web:f203e0bad5882fc709cc17"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const colRef = collection(db, "kitchenExpenses");

  const userEmails = {
    "haseebnazar.malik@gmail.com": "Haseeb",
    "haseebnazar.one@gmail.com": "Arsalan",
    "haseebnazar.two@gmail.com": "Aftab"
  };

  window.handleLogin = async () => {
    const email = document.getElementById('loginEmail').value;
    const pass = document.getElementById('loginPassword').value;
    try { await signInWithEmailAndPassword(auth, email, pass); } 
    catch (e) { document.getElementById('loginError').style.display = 'block'; }
  };

  onAuthStateChanged(auth, (user) => {
    if (user) {
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('mainApp').style.display = 'block';
      const name = userEmails[user.email] || "User";
      document.getElementById('userWelcome').innerText = "Hi, " + name;
      document.getElementById('tab' + name).click();
      filterData();
    } else {
      document.getElementById('loginPage').style.display = 'flex';
      document.getElementById('mainApp').style.display = 'none';
    }
  });

  window.handleLogout = () => signOut(auth);
  window.openNav = () => document.getElementById("mySidenav").style.width = "260px";
  window.closeNav = () => document.getElementById("mySidenav").style.width = "0";

  const monthSelector = document.getElementById('monthFilter');
  for(let i=0; i<6; i++){
      const d = new Date(); d.setMonth(d.getMonth()-i);
      const m = `${d.toLocaleString('default', { month: 'short' })} ${d.getFullYear()}`;
      const opt = document.createElement('option'); opt.value = m; opt.text = m; monthSelector.appendChild(opt);
  }

  window.filterData = () => {
      onSnapshot(query(colRef, orderBy("time", "desc")), (snap) => {
          let gt = 0;
          ['Haseeb', 'Arsalan', 'Aftab'].forEach(u => {
              const cont = document.getElementById(`list${u}`);
              let ut = 0; cont.innerHTML = "";
              snap.forEach(ds => {
                  const d = ds.data();
                  if(d.user === u && (d.monthLabel || "Mar 2026") === monthSelector.value) {
                      ut += Number(d.price);
                      cont.innerHTML += `<li><div style="flex:1">${d.item}</div><div style="font-weight:bold; color:#075e54">SAR ${d.price}</div></li>`;
                  }
              });
              document.getElementById(`total${u}`).innerText = ut; gt += ut;
          });
          document.getElementById('grandTotal').innerText = gt;
      });
  };

  window.addItem = async (u) => {
      const i = document.getElementById(`item${u}`).value, p = document.getElementById(`price${u}`).value;
      if(i && p) {
          await addDoc(colRef, { user: u, item: i, price: Number(p), time: Date.now(), monthLabel: monthSelector.value });
          document.getElementById(`item${u}`).value = ""; document.getElementById(`price${u}`).value = "";
      }
  };

  window.openTab = (e, n) => {
    let c = document.getElementsByClassName("content"), t = document.getElementsByClassName("tab");
    for (let i=0; i<c.length; i++) c[i].classList.remove("active");
    for (let i=0; i<t.length; i++) t[i].classList.remove("active");
    document.getElementById(n).classList.add("active"); e.currentTarget.classList.add("active");
  };
</script>
</body>
</html>
